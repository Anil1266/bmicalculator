<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Contact | FitMetrics Tools</title>

<style>

body{
font-family:Arial, Helvetica, sans-serif;
margin:0;
background:#0f0f0f;
color:white;
}

/* NAVBAR */

.navbar{
display:flex;
justify-content:center;
gap:30px;
background:#111;
padding:16px;
}

.navbar a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* CONTAINER */

.container{
max-width:700px;
margin:auto;
padding:30px;
}

/* FORM */

.contact-form{
background:#1a1a1a;
padding:25px;
border-radius:12px;
}

input,textarea{
width:100%;
padding:12px;
margin-bottom:12px;
border-radius:8px;
border:none;
background:#2c2c2c;
color:white;
}

button{
padding:12px 20px;
border:none;
border-radius:8px;
background:#1e88e5;
color:white;
cursor:pointer;
}

footer{
text-align:center;
padding:30px;
color:#aaa;
}

</style>

</head>

<body>

<nav class="navbar">

<a href="/">Home</a>

</nav>

<div class="container">

<h1>Contact Us</h1>

<p>
If you have any questions, feedback, or suggestions regarding
FitMetrics Tools, feel free to contact us using the form below.
</p>

<div class="contact-form">

<input type="text" placeholder="Your Name">

<input type="email" placeholder="Your Email">

<textarea rows="5" placeholder="Your Message"></textarea>

<button>Send Message</button>

</div>

<p style="margin-top:20px;">
You can also contact us directly at:
<br><br>
<strong>Email:</strong> anilvella999@gmail.com
</p>

</div>

<footer>

<p>© 2026 FitMetrics Tools</p>

</footer>

</body>

</html>
